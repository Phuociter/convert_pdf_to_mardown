<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI PDF to Markdown</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 p-10 text-white">
    <div class="max-w-4xl mx-auto bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold mb-2 text-center text-blue-400">AI PDF Converter</h1>
        <p class="text-center text-slate-400 mb-8">Sử dụng AI để trích xuất Công thức Toán & Bảng biểu</p>
        
        <div id="drop-zone" class="border-4 border-dashed border-slate-600 p-12 text-center cursor-pointer hover:border-blue-500 hover:bg-slate-700 transition-all rounded-xl">
            <p class="text-lg">Kéo thả file PDF vào đây hoặc <span class="text-blue-400 underline font-bold">chọn file</span></p>
            <input type="file" id="file-input" accept=".pdf" class="hidden">
        </div>

        <div id="loader" class="mt-8 hidden text-center">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-blue-500 mb-2"></div>
            <p id="status" class="text-blue-400 font-medium">AI đang "đọc" tài liệu... (có thể mất 30-60s)</p>
        </div>

        <div id="result-area" class="mt-8 hidden p-6 bg-slate-900 rounded-lg border border-green-500/30">
            <p class="text-green-400 font-bold mb-4">✅ Chuyển đổi thành công!</p>
            <a id="download-link" href="#" class="bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-lg font-bold transition inline-block">
                Tải file .MD về máy
            </a>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleUpload(e.target.files[0]);

        async function handleUpload(file) {
            if (!file) return;

            // Hiển thị trạng thái đang chạy
            document.getElementById('loader').classList.remove('hidden');
            document.getElementById('result-area').classList.add('hidden');
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                // Gọi API Python
                const response = await fetch('/convert', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.status === 'success') {
                    document.getElementById('download-link').href = data.downloadUrl;
                    document.getElementById('result-area').classList.remove('hidden');
                } else {
                    alert("Lỗi: " + data.message);
                }
            } catch (err) {
                alert("Không kết nối được server Python!");
            } finally {
                document.getElementById('loader').classList.add('hidden');
            }
        }
    </script>
</body>
</html>
